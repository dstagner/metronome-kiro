<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metronome</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Metronome</h1>

      <div id="audio-error" class="hidden">
        Web Audio API is unavailable. Running in silent mode (visual feedback only).
      </div>

      <div id="indicator"></div>

      <div class="bpm-section">
        <label for="slider-bpm">BPM</label>
        <input id="slider-bpm" type="range" min="20" max="300" value="120" />
        <span id="bpm-display">120</span>
      </div>

      <div class="beats-section">
        <label for="select-beats">Beats per measure</label>
        <select id="select-beats">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4" selected>4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
        </select>
      </div>

      <div class="controls">
        <button id="btn-start">Start</button>
        <button id="btn-stop" disabled>Stop</button>
        <button id="btn-tap">Tap</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
